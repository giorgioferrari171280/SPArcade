<div id="skill-challenge-timer-section" class="spa-section">

        <div class="main-container">
            <div class="layout-container">
        <header class="challenge-header-section"><h1 data-text="FUGA DAL FORTE ">FUGA DAL FORTE </h1></header>
        <div class="central-area">
            <div class="challenge-left-column">

                <div class="text-box"><div class="game-status" id="game-status-timer"></div></div>
            </div>
            <div class="challenge-right-column">
                <div class="right-top-band-timer">
                    <span class="variable-label">Tempo:</span>

                </div>

                        <span class="variable-value" id="suspicion-text-timer">0/100</span>
                        <div class="suspicion-bar" style="width: 100%; margin-top: 8px;"><div class="suspicion-fill" id="suspicion-fill-timer"></div></div>
                    </div>
                </div>
                <div class="right-center-band-timer">
                     <span class="variable-label">🗝 Progresso:</span>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; flex: 1; margin-left: 20px;">
                        <span class="variable-value" id="progress-counter-timer">0/15</span>
                        <div class="progress-bar" style="width: 100%; margin-top: 8px;"><div class="progress-fill" id="progress-fill-timer"></div></div>
                    </div>
                </div>
                <div class="right-bottom-band-timer">

        </div>
         <footer class="game-ui-footer-section"><div class="footer-left"><button class="back-button" onclick="backToMainMenu()">🏃 RITIRATA</button></div></footer>
            </div>
            
            <div id="result-screen-timer" class="result-overlay hidden">
                <div class="result-content"><div class="result-title" id="result-title-timer"></div><div class="result-icon" id="result-icon-timer"></div><div class="result-message" id="result-message-timer"></div><div id="result-buttons-timer"></div></div>
            </div>
        </div>
