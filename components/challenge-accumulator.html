<div id="skill-challenge-accumulator-section" class="spa-section">
    <div class="letterbox-wrapper">
        <div class="main-container">
            <div class="accumulator-layout">
                <div class="accumulator-left-column">
                    <div class="left-top-image">
                        <img id="square-image-acc" class="placeholder-image" style="display: none;" src="square_image.png" />
                        <div class="image-placeholder-text" id="image-placeholder-acc">💪 SFIDA DI FORZA</div>
                    </div>
                    <div class="game-status-container"><div class="game-status" id="game-status-acc">Premi SPAZIO per iniziare!</div></div>
                </div>
                <div class="accumulator-right-column">
                    <div class="right-top-band-acc">
                        <div class="variable-label">⏰ TEMPO</div>
                        <div class="timer-container"><div class="timer-circle" id="timer-fill-acc"><div class="timer-text-acc" id="timer-text-acc">60</div></div></div>
                    </div>
                    <div class="right-center-band-acc">
                        <div class="variable-label" style="text-align: center; margin-bottom: 10px;">🏆 PUNTI FORZA</div>
                        <div class="score-value" id="score-display-acc">0</div>
                        <div style="text-align: center; margin-top: 10px;"><div class="variable-label" style="font-size: 2vh;">Minimo per vincere: <span style="color: #f39c12;" id="win-threshold-acc">10</span></div></div>
                    </div>
                    <div class="right-bottom-band-acc">
                        <div class="action-bar-label">BARRA DELLA FORZA</div>
                        <div class="action-bar" id="action-bar-acc"><div class="action-sweet-spot" id="action-sweet-spot-acc"></div><div class="action-thumb" id="action-thumb-acc"></div></div>
                    </div>
                </div>
            </div>
            
            <div id="result-screen-acc" class="result-overlay hidden">
                <div class="result-content"><div class="result-title" id="result-title-acc"></div><div class="result-icon" id="result-icon-acc"></div><div class="result-message" id="result-message-acc"></div><div id="result-buttons-acc"></div></div>
            </div>
        </div>
    </div>
</div>
