<div id="cutscene-section" class="spa-section">
    <div class="letterbox-wrapper">
        <div class="main-container">
            <div class="layout-container">
                <header class="header-section">
                    <h1 id="cutscene-title" data-text="IL RICHIAMO DEL RAID">IL RICHIAMO DEL RAID</h1>
                </header>
                
                <main class="cutscene-main-section">
                    <div class="left-column">
                        <div class="image-container">
                            <img id="cutscene-image" style="display: none;" src="" alt="Cutscene Image" />
                            <div id="cutscene-image-placeholder" class="image-placeholder">Immagine della cutscene qui</div>
                        </div>
                    </div>
                    <div class="right-column">
                        <div class="narrative-section">
                            <div class="narrative-text" id="cutscene-narrative-content"></div>
                        </div>
                        <div class="button-section">
                            <button class="continue-button" onclick="continueCutscene()">CONTINUA</button>
                        </div>
                    </div>
                </main>
                
                <footer class="game-ui-footer-section">
                    <div class="footer-left"><button class="back-button" onclick="backToMainMenu()">🏃 RITIRATA</button></div>
                    <div class="footer-center"><button class="back-button" onclick="downloadSavegame()" style="background: linear-gradient(135deg, #27ae60, #229954);">💾 DOWNLOAD SAVEGAME</button></div>
                    <div class="footer-right"><div class="volume-control"><span id="volume-icon" class="volume-icon" onclick="toggleMute()">🔊</span><input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="50" oninput="changeVolume(this.value)"></div></div>
                </footer>
            </div>
        </div>
    </div>
</div>
