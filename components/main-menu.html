<div id="main-menu-section" class="spa-section active">
    <div class="letterbox-wrapper">
        <div class="main-container">
            <div class="layout-container">
                <header class="header-section">
                    <h1 data-text="RAIDS OF VALHALLA">RAIDS OF VALHALLA</h1>
                </header>
                
                <main class="main-section">
                    <div class="menu-box">
                        <div class="main-menu">
                            <button class="menu-button" onclick="startNewGame()">Nuovo Raid</button>
                            <button class="menu-button" onclick="loadGame()">Continua Raid</button>
                            <button class="menu-button" onclick="showImportSavegame()">Import Savegame</button>
                            <button class="menu-button" onclick="showHallOfFame()">Hall of Fame</button>
                            <button class="menu-button" onclick="showCredits()">Crediti</button>
                            <button class="menu-button" onclick="showTutorial()">Tutorial</button>
                            <button class="menu-button exit" onclick="exitGame()">Torna a Midgard</button>
                        </div>
                    </div>
                </main>
                
                <footer class="footer-section">
                    <p>Usa i tasti freccia per navigare, Invio per selezionare</p>
                </footer>
            </div>
        </div>
    </div>
</div>
