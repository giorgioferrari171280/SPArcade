<div id="player-name-section" class="spa-section">
    <div class="letterbox-wrapper">
        <div class="main-container">
            <div class="layout-container">
                <header class="header-section">
                    <h1 data-text="NUOVO GUERRIERO">NUOVO GUERRIERO</h1>
                </header>
                
                <main class="main-section">
                    <div class="player-name-container">
                        <div class="player-name-box">
                            <div class="player-name-title">Benvenuto, Guerriero del Nord!</div>
                            <div class="player-name-description">
                                Prima di brandire la tua ascia e salpare per razziare le terre sassoni, 
                                dimmi come vuoi essere chiamato nelle saghe che racconteranno le tue gesta!
                            </div>
                            <input type="text" id="player-name-input" class="player-name-input" placeholder="Inserisci il nome del tuo guerriero..." maxlength="20">
                            <div>
                                <button class="player-name-button" onclick="confirmPlayerName()">Inizia il Raid</button>
                                <button class="player-name-button cancel" onclick="backToMainMenu()">Annulla</button>
                            </div>
                        </div>
                    </div>
                </main>
                
                <footer class="footer-section">
                    <p>Inserisci un nome degno di un guerriero vichingo</p>
                </footer>
            </div>
        </div>
    </div>
</div>
