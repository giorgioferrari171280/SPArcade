<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit or Miss - Sniper Challenge</title>
    <style>
        /* Reset base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Elimina overflow e scrolling, sfondo nero per letterbox */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Contenitore letterbox 16:9 - QUESTO è la chiave */
        .letterbox-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vmin;
            height: calc(100vmin * 9 / 16);
            max-width: 100vw;
            max-height: calc(100vw * 9 / 16);
        }

        /* Se la finestra è più alta che larga */
        @media screen and (max-aspect-ratio: 16/9) {
            .letterbox-wrapper {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }

        /* Se la finestra è più larga che alta */
        @media screen and (min-aspect-ratio: 16/9) {
            .letterbox-wrapper {
                width: calc(100vh * 16 / 9);
                height: 100vh;
            }
        }

        /* Contenitore padre - SEMPRE 100% del letterbox wrapper */
        .main-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
        }

        /* Elemento figlio identico al padre con immagine */
        .child-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
        }

        /* Stile per l'immagine */
        .child-container img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Overlay shadow sopra l'immagine */
        .overlay-shadow {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.75);
        }

        /* Layout container principale */
        .layout-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* Area principale - 95% dell'altezza */
        .main-section {
            width: 100%;
            height: 95%;
            display: flex;
            flex-direction: row;
        }

        /* Contenitore meta sinistra - 50% larghezza, 100% altezza */
        .meta_sinistra {
            width: 50%;
            height: 100%;
            position: relative;
        }

        /* Box immagine quadrato - parte da (1%,1%) e occupa 84% larghezza */
        .box_immagine {
            position: absolute;
            top: 4%;
            left: 2%;
            width: 84%;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* Icona nella immagine quadrata */
        .mission-icon {
            font-size: 8vmin;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            animation: mission-glow 3s infinite;
            z-index: 1;
        }

        @keyframes mission-glow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }


        /* Barra verticale - a destra del box immagine con spazio */
        .barra_verticale {
            position: absolute;
            top: 1%;
            left: 87%;
            width: 12%;
            height: 84%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .vertical-bar-label {
            color: #ffffff;
            font-size: 1.5vmin;
            font-weight: bold;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .vertical-bar {
            width: 70%;
            height: 80%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* Barra inferiore - sotto box immagine - ALTEZZA 14% */
        .barra_inferiore {
            position: absolute;
            top: 86%;
            left: 0%;
            width: 100%;
            height: 14%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .bar-label {
            color: #ffffff;
            font-size: 1.5vmin;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .horizontal-bar {
            width: 80%;
            height: 70%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* Sweet spot generico - IDENTICO PER ENTRAMBE LE BARRE */
        .sweet-spot {
            position: absolute;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            opacity: 0.8;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
            transition: all 0.3s ease;
        }

        .sweet-spot.horizontal {
            height: 100%;
            border-radius: 50px;
        }

        .sweet-spot.vertical {
            width: 100%;
            border-radius: 50px;
        }

        .sweet-spot.locked {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.8);
        }

        /* Thumb generico - IDENTICO PER ENTRAMBE LE BARRE */
        .thumb {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            transition: none;
            border: 2px solid #e74c3c;
            z-index: 5;
            width: 18px;
            height: 18px;
        }

        .thumb.horizontal {
            top: 50%;
            transform: translateY(-50%);
        }

        .thumb.vertical {
            left: 50%;
            transform: translateX(-50%);
        }

        .thumb.locked {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.8);
        }

        .thumb.inactive {
            opacity: 0.3;
            border-color: #666;
        }

        /* Contenitore meta destra - 50% larghezza, 100% altezza */
        .meta_destra {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Contenitori orizzontali dentro meta_destra */
        .destra_alto {
            width: 100%;
            height: 33.33%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 1%;
            box-sizing: border-box;
        }

        .narrative-text {
            color: #ffffff;
            font-size: 1.8vmin;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: normal;
        }

        .game-status {
            color: #ffffff;
            font-size: 2.2vmin;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            line-height: 1.3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: normal;
        }

        .destra_centro {
            width: 100%;
            height: 33.33%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            margin: 1%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .destra_basso {
            width: 100%;
            height: 33.34%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            margin: 1%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Footer section - 5% dell'altezza */
        .footer-section {
            width: 100%;
            height: 5%;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.5vmin;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* Schermata di risultato */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .result-content {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 80%;
        }

        .result-title {
            font-size: 4vmin;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .result-success {
            color: #2ECC71;
        }

        .result-failure {
            color: #E74C3C;
        }

        .result-icon {
            font-size: 8vmin;
            margin: 20px 0;
            animation: result-bounce 2s infinite;
        }

        @keyframes result-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .result-message {
            font-size: 2.2vmin;
            margin: 20px 0;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .retry-button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 2.5vmin;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
            margin-top: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .retry-button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="letterbox-wrapper">
        <div class="main-container">
            <!-- Elemento figlio identico al padre con immagine -->
            <div class="child-container">
                <img id="background-image" src="sniper_bg.png" alt="Immagine di sfondo">
            </div>
            
            <!-- Overlay shadow sopra l'immagine -->
            <div class="overlay-shadow"></div>
            
            <!-- Layout container principale -->
            <div class="layout-container">
                <!-- Area centrale con meta sinistra e destra -->
                <div class="main-section">
                    <!-- Meta sinistra con i suoi contenitori -->
                    <div class="meta_sinistra">
                        <div class="box_immagine">
                            <div class="mission-icon" id="missionIcon">🎯</div>
                        </div>
                        
                        <div class="barra_verticale">
                            <div class="vertical-bar-label">ASSE Y</div>
                            <div class="vertical-bar" id="vertical-bar">
                                <div class="sweet-spot vertical" id="vertical-sweet-spot"></div>
                                <div class="thumb vertical inactive" id="vertical-thumb"></div>
                            </div>
                        </div>
                        
                        <div class="barra_inferiore">
                            <div class="bar-label">ASSE X</div>
                            <div class="horizontal-bar" id="horizontal-bar">
                                <div class="sweet-spot horizontal" id="horizontal-sweet-spot"></div>
                                <div class="thumb horizontal" id="horizontal-thumb"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Meta destra con i tre contenitori orizzontali -->
                    <div class="meta_destra">
                        <div class="destra_alto">
                            <div class="narrative-text">
                                🎯 <strong>MISSIONE CECCHINO</strong><br>
                                Sei un tiratore scelto in posizione. Il bersaglio è nel mirino.<br>
                                Hai <strong>UN SOLO COLPO</strong> per completare la missione.<br>
                                Allinea perfettamente entrambi gli assi X e Y per centrare il bersaglio.
                            </div>
                        </div>
                        <div class="destra_centro">
                            <div class="game-status" id="game-status">
                                Premi SPAZIO o CLICK per bloccare l'Asse X
                            </div>
                        </div>
                        <div class="destra_basso">
                            <!-- Sezione bassa vuota per ora -->
                        </div>
                    </div>
                </div>
                
                <!-- Footer section -->
                <div class="footer-section">
                    🎯 HIT OR MISS - ONE SHOT ONE KILL 🎯
                </div>
            </div>

            <!-- Schermata risultato -->
            <div id="result-screen" class="result-overlay hidden">
                <div class="result-content">
                    <div class="result-title" id="result-title"></div>
                    <div class="result-icon" id="result-icon"></div>
                    <div class="result-message" id="result-message"></div>
                    <div id="result-buttons"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURAZIONE MISSIONE =================
        const missionConfig = {
            background: {
                image: "sniper_bg.png"
            },
            texts: {
                initialMessage: "Premi SPAZIO o CLICK per bloccare l'Asse X",
                lockingX: "ASSE X BLOCCATO! Premi SPAZIO o CLICK per bloccare l'Asse Y",
                lockingY: "ASSE Y BLOCCATO! COLPO IN CORSO...",
                shotFired: "COLPO SPARATO!"
            }
        };

        class SniperGame {
            constructor() {
                this.gameActive = false;
                this.currentPhase = 'aiming-x'; // 'aiming-x', 'aiming-y', 'shot-fired', 'game-over'
                
                // Posizioni dei thumb (0-100)
                this.horizontalThumbPosition = 0;
                this.verticalThumbPosition = 0;
                
                // Posizioni degli sweet spot (0-100)
                this.horizontalSweetSpotPosition = 50;
                this.verticalSweetSpotPosition = 50;
                
                // Dimensioni degli sweet spot
                this.sweetSpotWidth = 15; // percentuale per orizzontale
                this.sweetSpotHeight = 15; // percentuale per verticale
                
                // Velocità e direzione
                this.horizontalSpeed = 2.5;
                this.verticalSpeed = 2.5;
                this.horizontalDirection = 1;
                this.verticalDirection = 1;
                
                // Stati di blocco
                this.horizontalLocked = false;
                this.verticalLocked = false;
                
                // Animazioni
                this.horizontalAnimationId = null;
                this.verticalAnimationId = null;
                
                this.loadMissionConfig();
                this.setupEventListeners();
                this.startMission();
            }
            
            loadMissionConfig() {
                const backgroundImg = document.getElementById('background-image');
                if (backgroundImg) {
                    backgroundImg.src = missionConfig.background.image;
                }
                
                const gameStatus = document.getElementById('game-status');
                if (gameStatus) {
                    gameStatus.textContent = missionConfig.texts.initialMessage;
                }
            }
            
            setupEventListeners() {
                // Listener per SPAZIO
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.handleAction();
                    }
                });
                
                // Listener per click del mouse
                document.addEventListener('click', (e) => {
                    // Se il click è sulla schermata risultato, ignora
                    if (e.target.closest('#result-screen')) {
                        return;
                    }
                    
                    // Se il gioco è attivo, gestisci l'azione
                    if (this.gameActive || this.currentPhase !== 'game-over') {
                        e.preventDefault();
                        this.handleAction();
                    }
                });
            }
            
            startMission() {
                this.showMessage(missionConfig.texts.initialMessage);
                this.updateMissionIcon('🎯');
                
                // Posiziona gli sweet spot in posizioni casuali
                this.setupSweetSpots();
                
                // Inizia SOLO l'animazione orizzontale
                this.startHorizontalAnimation();
            }
            
            setupSweetSpots() {
                // Posiziona sweet spot orizzontale
                const minHorizontal = this.sweetSpotWidth / 2;
                const maxHorizontal = 100 - this.sweetSpotWidth / 2;
                this.horizontalSweetSpotPosition = minHorizontal + Math.random() * (maxHorizontal - minHorizontal);
                
                // Posiziona sweet spot verticale
                const minVertical = this.sweetSpotHeight / 2;
                const maxVertical = 100 - this.sweetSpotHeight / 2;
                this.verticalSweetSpotPosition = minVertical + Math.random() * (maxVertical - minVertical);
                
                // Applica posizioni agli elementi DOM
                const horizontalSweetSpot = document.getElementById('horizontal-sweet-spot');
                horizontalSweetSpot.style.width = this.sweetSpotWidth + '%';
                horizontalSweetSpot.style.left = (this.horizontalSweetSpotPosition - this.sweetSpotWidth/2) + '%';
                
                const verticalSweetSpot = document.getElementById('vertical-sweet-spot');
                verticalSweetSpot.style.height = this.sweetSpotHeight + '%';
                verticalSweetSpot.style.top = (this.verticalSweetSpotPosition - this.sweetSpotHeight/2) + '%';
            }
            
            startHorizontalAnimation() {
                this.gameActive = true;
                // Attiva SOLO il thumb orizzontale
                document.getElementById('horizontal-thumb').classList.remove('inactive');
                document.getElementById('vertical-thumb').classList.add('inactive');
                this.animateHorizontalThumb();
            }

            startVerticalAnimation() {
                // Ferma animazione orizzontale e attiva quella verticale
                if (this.horizontalAnimationId) {
                    cancelAnimationFrame(this.horizontalAnimationId);
                }
                
                // Attiva SOLO il thumb verticale
                document.getElementById('horizontal-thumb').classList.add('inactive');
                document.getElementById('vertical-thumb').classList.remove('inactive');
                this.animateVerticalThumb();
            }
            
            animateHorizontalThumb() {
                if (!this.gameActive || this.horizontalLocked) return;
                
                this.horizontalThumbPosition += this.horizontalSpeed * this.horizontalDirection;
                
                if (this.horizontalThumbPosition >= 98) {
                    this.horizontalThumbPosition = 98;
                    this.horizontalDirection = -1;
                } else if (this.horizontalThumbPosition <= 2) {
                    this.horizontalThumbPosition = 2;
                    this.horizontalDirection = 1;
                }
                
                document.getElementById('horizontal-thumb').style.left = this.horizontalThumbPosition + '%';
                this.horizontalAnimationId = requestAnimationFrame(() => this.animateHorizontalThumb());
            }
            
            animateVerticalThumb() {
                if (!this.gameActive || this.verticalLocked) return;
                
                this.verticalThumbPosition += this.verticalSpeed * this.verticalDirection;
                
                if (this.verticalThumbPosition >= 98) {
                    this.verticalThumbPosition = 98;
                    this.verticalDirection = -1;
                } else if (this.verticalThumbPosition <= 2) {
                    this.verticalThumbPosition = 2;
                    this.verticalDirection = 1;
                }
                
                document.getElementById('vertical-thumb').style.top = this.verticalThumbPosition + '%';
                this.verticalAnimationId = requestAnimationFrame(() => this.animateVerticalThumb());
            }
            
            handleAction() {
                if (this.currentPhase === 'aiming-x' && !this.horizontalLocked) {
                    this.lockHorizontalAxis();
                } else if (this.currentPhase === 'aiming-y' && !this.verticalLocked) {
                    this.lockVerticalAxisAndShoot();
                } else if (this.currentPhase === 'game-over') {
                    return;
                }
            }
            
            lockHorizontalAxis() {
                this.horizontalLocked = true;
                this.currentPhase = 'aiming-y';
                
                const isInHorizontalSweet = this.checkHorizontalHit();
                
                if (isInHorizontalSweet) {
                    document.getElementById('horizontal-thumb').classList.add('locked');
                    document.getElementById('horizontal-sweet-spot').classList.add('locked');
                }
                
                this.showMessage(missionConfig.texts.lockingX);
                this.updateMissionIcon('🟡');
                
                // Avvia l'animazione verticale
                setTimeout(() => {
                    this.startVerticalAnimation();
                }, 500);
            }
            
            lockVerticalAxisAndShoot() {
                this.verticalLocked = true;
                this.currentPhase = 'shot-fired';
                this.gameActive = false;
                
                // Ferma tutte le animazioni
                if (this.verticalAnimationId) {
                    cancelAnimationFrame(this.verticalAnimationId);
                }
                
                const isInVerticalSweet = this.checkVerticalHit();
                const isInHorizontalSweet = this.checkHorizontalHit();
                
                if (isInVerticalSweet) {
                    document.getElementById('vertical-thumb').classList.add('locked');
                    document.getElementById('vertical-sweet-spot').classList.add('locked');
                }
                
                // Disattiva entrambi i thumb
                document.getElementById('horizontal-thumb').classList.add('inactive');
                document.getElementById('vertical-thumb').classList.add('inactive');
                
                this.showMessage(missionConfig.texts.shotFired);
                this.updateMissionIcon('💥');
                
                setTimeout(() => {
                    this.evaluateShot(isInHorizontalSweet, isInVerticalSweet);
                }, 1500);
            }
            
            checkHorizontalHit() {
                const sweetStart = this.horizontalSweetSpotPosition - this.sweetSpotWidth/2;
                const sweetEnd = this.horizontalSweetSpotPosition + this.sweetSpotWidth/2;
                return this.horizontalThumbPosition >= sweetStart && this.horizontalThumbPosition <= sweetEnd;
            }
            
            checkVerticalHit() {
                const sweetStart = this.verticalSweetSpotPosition - this.sweetSpotHeight/2;
                const sweetEnd = this.verticalSweetSpotPosition + this.sweetSpotHeight/2;
                return this.verticalThumbPosition >= sweetStart && this.verticalThumbPosition <= sweetEnd;
            }
            
            evaluateShot(horizontalHit, verticalHit) {
                this.currentPhase = 'game-over';
                
                let result;
                if (horizontalHit && verticalHit) {
                    result = 'perfect';
                } else if (horizontalHit || verticalHit) {
                    result = 'near';
                } else {
                    result = 'miss';
                }
                
                this.showResult(result);
            }
            
            showResult(result) {
                const resultTitle = document.getElementById('result-title');
                const resultIcon = document.getElementById('result-icon');
                const resultMessage = document.getElementById('result-message');
                const resultButtons = document.getElementById('result-buttons');
                
                if (result === 'perfect') {
                    resultTitle.textContent = "COLPO PERFETTO!";
                    resultTitle.className = "result-title result-success";
                    resultIcon.textContent = "🎯";
                    resultMessage.textContent = "INCREDIBILE! Hai centrato perfettamente il bersaglio con un solo colpo! Precisione chirurgica degna di un cecchino d'élite.";
                    this.updateMissionIcon('🏆');
                } else if (result === 'near') {
                    resultTitle.textContent = "COLPO VICINO!";
                    resultTitle.className = "result-title result-failure";
                    resultIcon.textContent = "😔";
                    resultMessage.textContent = "Quasi! Hai centrato solo un asse. Il colpo ha sfiorato il bersaglio ma non è stato fatale.";
                    this.updateMissionIcon('❌');
                } else {
                    resultTitle.textContent = "BERSAGLIO MANCATO!";
                    resultTitle.className = "result-title result-failure";
                    resultIcon.textContent = "💀";
                    resultMessage.textContent = "FALLIMENTO TOTALE! Hai mancato completamente il bersaglio. Nessun asse centrato.";
                    this.updateMissionIcon('💥');
                }
                
                resultButtons.innerHTML = `
                    <button class="retry-button" onclick="restartMission()">🎯 RIPROVA LA MISSIONE 🎯</button>
                `;
                
                document.getElementById('result-screen').classList.remove('hidden');
            }
            
            updateMissionIcon(icon) {
                document.getElementById('missionIcon').textContent = icon;
            }
            
            showMessage(message) {
                const statusDiv = document.getElementById('game-status');
                statusDiv.textContent = message;
            }
        }
        
        let game;
        
        function restartMission() {
            document.getElementById('result-screen').classList.add('hidden');
            
            // Reset visuali
            document.getElementById('horizontal-thumb').classList.remove('locked', 'inactive');
            document.getElementById('vertical-thumb').classList.remove('locked');
            document.getElementById('vertical-thumb').classList.add('inactive');
            document.getElementById('horizontal-sweet-spot').classList.remove('locked');
            document.getElementById('vertical-sweet-spot').classList.remove('locked');
            
            // Reset posizioni
            document.getElementById('horizontal-thumb').style.left = '2%';
            document.getElementById('vertical-thumb').style.top = '2%';
            
            // Riavvia il gioco
            game = new SniperGame();
        }
        
        window.addEventListener('load', () => {
            game = new SniperGame();
        });
    </script>
</body>
</html>
